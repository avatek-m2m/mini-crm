<!DOCTYPE html>
<html lang="pt-br">
<head>
  <meta charset="UTF-8">
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bulma@0.9.4/css/bulma.min.css">
  <script src="https://cdn.jsdelivr.net/npm/sortablejs@1.15.0/Sortable.min.js"></script>
  <style>
    .kanban-board { display: flex; gap: 15px; padding: 20px; overflow-x: auto; background: #f4f5f7; min-height: 100vh; }
    .column { background: #ebedf0; min-width: 250px; border-radius: 5px; padding: 10px; }
    .card { background: white; padding: 10px; margin-bottom: 10px; border-radius: 3px; cursor: grab; box-shadow: 0 1px 2px #0003; }
    h3 { font-weight: bold; margin-bottom: 10px; font-size: 0.8rem; text-transform: uppercase; }
  </style>
</head>
<body>
  <div class="kanban-board" id="board">
    <div class="column"><h3>Pedido Executivo</h3><div id="Pedido Executivo" class="list"></div></div>
    <div class="column"><h3>Pedido Compra</h3><div id="Pedido Compra" class="list"></div></div>
    <div class="column"><h3>NF Compra</h3><div id="NF Compra" class="list"></div></div>
    <div class="column"><h3>NF Venda+Etiqueta</h3><div id="NF Venda+Etiqueta" class="list"></div></div>
    <div class="column"><h3>Despacho</h3><div id="Despacho do Pedido" class="list"></div></div>
    <div class="column"><h3>ICCID/IMEI</h3><div id="Listagem de ICCID e IMEI" class="list"></div></div>
  </div>

  <script>
    const WEB_APP_URL = "https://script.google.com/macros/s/AKfycbxaEfSB47PUZSMV5mLFMNCNMerEzTQA1QXNqcXtocW1Y7w2ROUiIwsJJQThKhRs6LFd/exec"; // COLOQUE SUA URL AQUI

    // 1. BUSCAR DADOS (GET)
    async function carregarDados() {
      const response = await fetch(`${WEB_APP_URL}?acao=ler`);
      const pedidos = await response.json();
      
      pedidos.forEach(p => {
        const card = document.createElement('div');
        card.className = 'card';
        card.id = p.id;
        card.innerText = p.id;
        const col = document.getElementById(p.status) || document.getElementById('Pedido Executivo');
        col.appendChild(card);
      });
      initSortable();
    }

    // 2. ENVIAR DADOS (POST)
    function initSortable() {
      document.querySelectorAll('.list').forEach(el => {
        new Sortable(el, {
          group: 'kanban',
          onEnd: async (evt) => {
            const payload = { id: evt.item.id, novoStatus: evt.to.id };
            // Usamos o modo 'no-cors' ou redirecionamento para o Apps Script
            fetch(WEB_APP_URL, {
              method: 'POST',
              mode: 'no-cors', 
              body: JSON.stringify(payload)
            });
          }
        });
      });
    }

    carregarDados();
  </script>
</body>
</html>
